name: release
on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Install Poetry
        run: pipx install poetry==2.3.2
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: poetry
      - name: Check tag matches project version
        run: |
          version="$(poetry version --short)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $version"
            exit 1
          fi
      - name: Check CITATION.cff version matches tag
        run: |
          cff_version="$(awk '/^version:/{v=$2; gsub(/["'"'"']/,"",v); print v; exit}' CITATION.cff)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$cff_version" != "$tag" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match CITATION.cff version $cff_version"
            exit 1
          fi
      - name: Check lock file is in sync
        run: poetry check --lock
      - name: Install dependencies
        run: poetry install --with dev --no-interaction
      - name: Run tests
        run: poetry run pytest
      - name: Build distributions
        run: poetry build
      - name: Validate distribution metadata
        run: pipx run twine check --strict dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          # PEP 440 pre-release suffixes (1.0.0a1, 1.0.0b2, 1.0.0rc1, 1.0.0.dev3)
          if echo "$TAG" | grep -qE '[0-9](a|b|rc|\.dev)[0-9]+$'; then
            prerelease="--prerelease"
          else
            prerelease="--latest"
          fi
          gh release create "$TAG" dist/* \
            --repo "$REPO" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            $prerelease
